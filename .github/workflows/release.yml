name: release

# Triggered when the `release` branch advances (direct push or PR merge).
# Reads the version from Cargo.toml, builds a linux-aarch64 binary, and
# publishes it as an asset on a GitHub Release tagged `v<version>`.
# The `cokacctl update` flow on the Oracle Cloud ARM64 VPS reads it.
#
# Only linux-aarch64 is built because that's the only target the author
# actually deploys to. Adding other targets later is one matrix entry away.

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  release:
    # GitHub's free ARM64 Linux runner — builds natively, no cross-compile.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          v=$(awk -F '"' '/^version *=/ { print $2; exit }' Cargo.toml)
          if [ -z "$v" ]; then
            echo "::error::Could not read version from Cargo.toml"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"    >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build --release
        run: cargo build --release

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/release/cokacdir dist/cokacdir-linux-aarch64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name:     ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: dist/cokacdir-linux-aarch64
          generate_release_notes: true
          make_latest: "true"
